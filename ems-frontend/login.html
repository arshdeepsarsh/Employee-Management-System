<!DOCTYPE html>

<html>

<head>

<title>Login</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f6f8;
}

.login-box{
width:350px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="login-box">

<h3 class="text-center">HR System Login</h3>

<br>

<input id="email"
class="form-control"
placeholder="Email">

<br>

<input id="password"
type="password"
class="form-control"
placeholder="Password">

<br>

<button onclick="login()" class="btn btn-primary w-100">
Login
</button>

</div>

<script>

function login(){

let email = document.getElementById("email").value
let password = document.getElementById("password").value

if(email==="admin@company.com" && password==="admin123"){

window.location.href="index.html"

}else{

alert("Invalid login")

}

}

</script>

</body>

</html>
